#cloud-config

manage_etc_hosts: true

users:
  - default
  - name: rocky
    groups: wheel
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDNLuT0itw31HxUob6Gf3OEBddZifIDyDECqT06uLv/g letunglam@ubuntu

ssh_pwauth: false
disable_root: true

package_update: true
package_upgrade: false

packages:
  - curl
  - wget
  - git
  - vim
  - bash-completion
  - net-tools
  - bind-utils
  - tar
  - unzip
  - python3
  - python3-pip

runcmd:
  - systemctl enable --now chronyd
  - timedatectl set-timezone UTC
  - echo "Bootstrap complete" > /var/log/bootstrap.log

write_files:
  - path: /etc/motd
    content: |
      =============================================
        Rocky Linux 9 — bootstrapped via cloud-init
      =============================================

final_message: |
  Rocky 9 cloud-init bootstrap complete.
  Version: $version
  Uptime: $uptime
